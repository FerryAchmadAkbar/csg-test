name: Uji 4 Tools Validasi Konfigurasi

on:
  push:
    branches: [ main ]

jobs:

  tool-1-size-limit:
    name: "Tool 1 - size-limit"
    runs-on: ubuntu-latest
    steps:
      - name: Ambil semua file dari repository
        uses: actions/checkout@v4

      - name: Siapkan Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install size-limit
        run: npm install -g size-limit @size-limit/file

      - name: Jalankan size-limit ke semua file configs
        run: |
          echo "=== HASIL TOOL 1: size-limit ==="
          npx size-limit --json 2>&1 || echo "size-limit selesai (ada yang melebihi limit)"
        continue-on-error: true

  tool-2-checkov:
    name: "Tool 2 - Checkov"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Siapkan Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov

      - name: Jalankan Checkov ke folder configs
        run: |
          echo "=== HASIL TOOL 2: Checkov ==="
          checkov -d configs/ --quiet 2>&1 || echo "Checkov selesai berjalan"
        continue-on-error: true

  tool-3-json-yaml-validate:
    name: "Tool 3 - json-yaml-validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Jalankan json-yaml-validate
        uses: GrantBirki/json-yaml-validate@v3
        with:
          json_schema: schema/config-schema.json
          files: |
            configs/valid/app-normal.json
            configs/faulty/wdt-001.json
            configs/faulty/mrf-001.json
            configs/faulty/ufi-001.json
            configs/faulty/ab-001.json
        continue-on-error: true

  tool-4-boeing:
    name: "Tool 4 - Boeing Validator"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Siapkan Go (bahasa pemrograman untuk Boeing)
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Boeing validator
        run: go install github.com/Boeing/config-file-validator/cmd/validator@latest

      - name: Jalankan Boeing ke folder configs
        run: |
          echo "=== HASIL TOOL 4: Boeing Validator ==="
          ~/go/bin/validator --search-path configs/ 2>&1 || echo "Boeing validator selesai"
        continue-on-error: true
